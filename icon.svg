<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1A2528"/>
      <stop offset="100%" stop-color="#1E2A2E"/>
    </linearGradient>
    <linearGradient id="leaf" x1="0" y1="0" x2="0.8" y2="1">
      <stop offset="0%" stop-color="#6B9E8F"/>
      <stop offset="50%" stop-color="#4A7C6F"/>
      <stop offset="100%" stop-color="#2D5A4E"/>
    </linearGradient>
    <linearGradient id="leafInner" x1="0.2" y1="0" x2="0.8" y2="1">
      <stop offset="0%" stop-color="#8FBFB0"/>
      <stop offset="100%" stop-color="#5A9A88"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="256" height="256" rx="48" ry="48" fill="url(#bg)"/>

  <!-- Outer glow -->
  <ellipse cx="128" cy="128" rx="70" ry="85" fill="#4A7C6F" opacity="0.08"/>

  <!-- Main sage leaf shape -->
  <path d="M128 40 C160 65, 190 100, 188 140 C186 175, 165 210, 128 225 C91 210, 70 175, 68 140 C66 100, 96 65, 128 40Z"
        fill="url(#leaf)" opacity="0.95"/>

  <!-- Inner leaf highlight -->
  <path d="M128 55 C152 75, 175 105, 173 138 C171 168, 155 198, 128 210 C101 198, 85 168, 83 138 C81 105, 104 75, 128 55Z"
        fill="url(#leafInner)" opacity="0.25"/>

  <!-- Central vein -->
  <line x1="128" y1="60" x2="128" y2="210" stroke="#A8D4C0" stroke-width="2" opacity="0.6" stroke-linecap="round"/>

  <!-- Side veins -->
  <path d="M128 90 Q108 100, 92 115" stroke="#A8D4C0" stroke-width="1.2" fill="none" opacity="0.35" stroke-linecap="round"/>
  <path d="M128 90 Q148 100, 164 115" stroke="#A8D4C0" stroke-width="1.2" fill="none" opacity="0.35" stroke-linecap="round"/>
  <path d="M128 120 Q104 132, 82 148" stroke="#A8D4C0" stroke-width="1.2" fill="none" opacity="0.35" stroke-linecap="round"/>
  <path d="M128 120 Q152 132, 174 148" stroke="#A8D4C0" stroke-width="1.2" fill="none" opacity="0.35" stroke-linecap="round"/>
  <path d="M128 150 Q108 162, 88 175" stroke="#A8D4C0" stroke-width="1.2" fill="none" opacity="0.35" stroke-linecap="round"/>
  <path d="M128 150 Q148 162, 168 175" stroke="#A8D4C0" stroke-width="1.2" fill="none" opacity="0.35" stroke-linecap="round"/>
  <path d="M128 180 Q115 188, 100 198" stroke="#A8D4C0" stroke-width="1.2" fill="none" opacity="0.3" stroke-linecap="round"/>
  <path d="M128 180 Q141 188, 156 198" stroke="#A8D4C0" stroke-width="1.2" fill="none" opacity="0.3" stroke-linecap="round"/>

  <!-- Code bracket accents -->
  <text x="58" y="140" font-family="SF Mono, Fira Code, monospace" font-size="36" font-weight="400" fill="#89DDFF" opacity="0.5">{</text>
  <text x="186" y="140" font-family="SF Mono, Fira Code, monospace" font-size="36" font-weight="400" fill="#89DDFF" opacity="0.5">}</text>
</svg>
